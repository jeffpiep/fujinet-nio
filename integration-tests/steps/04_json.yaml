group: Network / JSON Query
steps:
  - name: "JSON: Open translated view for /url"
    argv: ["{CLI}", "net", "open", "--content-type", "json", "--selector", "/url", "{HTTP}/get"]
    expect:
      - "accepted=True"
    capture_var:
      name: HANDLE
      pattern: "handle=(\\d+)"
    timeout_s: 10

  - name: "JSON: Read result"
    argv: ["{CLI}", "net", "read", "--max-bytes", "512", "{HANDLE}"]
    expect:
      - "127.0.0.1:8080/get"
    timeout_s: 10

  - name: "JSON: translate /headers/Host on same handle"
    argv: ["{CLI}", "net", "translate", "--handle", "{HANDLE}", "--content-type", "json", "--selector", "/headers/Host"]
    expect:
      - "result_available=True"
    timeout_s: 10

  - name: "JSON: Read second result"
    argv: ["{CLI}", "net", "read", "--max-bytes", "512", "{HANDLE}"]
    expect:
      - "127.0.0.1:8080"
    timeout_s: 10

  - name: "JSON: Close handle"
    argv: ["{CLI}", "net", "close", "{HANDLE}"]
    expect:
      - "closed"
    timeout_s: 5
